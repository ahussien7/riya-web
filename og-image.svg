<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="50%" stop-color="#3730A3"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>

    <!-- Orb blur filters -->
    <filter id="orb1-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="orb2-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="orb3-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>

    <!-- Logo clip -->
    <clipPath id="logo-clip">
      <rect width="200" height="200" rx="45" x="0" y="0"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Radial top glow -->
  <ellipse cx="600" cy="-80" rx="700" ry="340" fill="#4F46E5" opacity="0.45"/>

  <!-- Radial bottom-right glow -->
  <ellipse cx="1050" cy="700" rx="500" ry="280" fill="#4338CA" opacity="0.22"/>

  <!-- Floating orb 1 — top-left -->
  <circle cx="-60" cy="110" r="280" fill="#6366F1" opacity="0.14" filter="url(#orb1-blur)"/>

  <!-- Floating orb 2 — bottom-right -->
  <circle cx="1220" cy="530" r="200" fill="#818CF8" opacity="0.12" filter="url(#orb2-blur)"/>

  <!-- Floating orb 3 — mid-right -->
  <circle cx="1050" cy="180" r="160" fill="#A5B4FC" opacity="0.07" filter="url(#orb3-blur)"/>

  <!-- Floating orb 4 — bottom-left -->
  <circle cx="120" cy="560" r="180" fill="#6366F1" opacity="0.09" filter="url(#orb2-blur)"/>

  <!-- ─── Logo icon — centered at 600,215 ─── -->
  <!-- Logo container: 200x200 rounded rect -->
  <g transform="translate(500, 115)">
    <!-- Background rect with clip -->
    <rect width="200" height="200" rx="45" fill="#4F46E5"/>
    <rect width="200" height="200" rx="45" fill="white" opacity="0.06"/>

    <!-- Flag decorations (scaled 2x from original 100x100 viewBox) -->
    <g opacity="0.30">
      <!-- US flag — top-left -->
      <g transform="translate(20,24) rotate(-5) scale(2)">
        <rect width="7" height="4.5" rx=".5" fill="#3C3B6E"/>
        <rect y="1.5" width="7" height=".8" fill="#B22234"/>
        <rect y="3" width="7" height=".8" fill="#B22234"/>
      </g>
      <!-- EU flag — top-right area -->
      <g transform="translate(110,14) rotate(3) scale(2)">
        <rect width="7" height="4.5" rx=".5" fill="#003399"/>
        <circle cx="3.5" cy="2.25" r="1" fill="#FFCC00"/>
      </g>
      <!-- Japan flag -->
      <g transform="translate(176,30) rotate(8) scale(2)">
        <rect width="7" height="4.5" rx=".5" fill="white"/>
        <circle cx="3.5" cy="2.25" r="1.2" fill="#BC002D"/>
      </g>
      <!-- India flag -->
      <g transform="translate(14,70) rotate(-12) scale(2)">
        <rect width="7" height="1.5" fill="#FF9933"/>
        <rect y="1.5" width="7" height="1.5" fill="#FFF"/>
        <rect y="3" width="7" height="1.5" fill="#138808"/>
      </g>
      <!-- UK flag -->
      <g transform="translate(184,110) rotate(5) scale(2)">
        <rect width="7" height="4.5" rx=".5" fill="#00247D"/>
        <path d="M0 0L7 4.5M7 0L0 4.5" stroke="white" stroke-width=".6"/>
      </g>
      <!-- Mexico flag -->
      <g transform="translate(40,176) rotate(-8) scale(2)">
        <rect width="2.3" height="4.5" fill="#006847"/>
        <rect x="2.3" width="2.4" height="4.5" fill="#FFF"/>
        <rect x="4.7" width="2.3" height="4.5" fill="#CE1126"/>
      </g>
      <!-- Germany flag -->
      <g transform="translate(150,180) rotate(10) scale(2)">
        <rect width="7" height="1.5" fill="#000"/>
        <rect y="1.5" width="7" height="1.5" fill="#DD0000"/>
        <rect y="3" width="7" height="1.5" fill="#FFCE00"/>
      </g>
      <!-- France flag -->
      <g transform="translate(80,184) rotate(-3) scale(2)">
        <rect width="2.3" height="4.5" fill="#0055A4"/>
        <rect x="2.3" width="2.4" height="4.5" fill="#FFF"/>
        <rect x="4.7" width="2.3" height="4.5" fill="#EF4135"/>
      </g>
    </g>

    <!-- R letter mark (scaled 2x from 100x100 to 200x200 viewBox) -->
    <path d="M56 44V156H92V110H104L132 156H170L136 100C152 92 160 76 160 60C160 44 144 36 120 36H56ZM92 68H120C124 68 128 70 128 74C128 78 124 80 120 80H92V68Z" fill="white"/>
    <rect x="40" y="84" width="52" height="10" rx="2" fill="white"/>
    <rect x="40" y="108" width="52" height="10" rx="2" fill="white"/>
  </g>

  <!-- "RIYA" wordmark -->
  <text
    x="600"
    y="378"
    font-family="'DM Sans', system-ui, -apple-system, Helvetica Neue, sans-serif"
    font-size="52"
    font-weight="800"
    fill="white"
    letter-spacing="14"
    text-anchor="middle"
    dominant-baseline="auto"
  >RIYA</text>

  <!-- Tagline -->
  <text
    x="600"
    y="428"
    font-family="'DM Sans', system-ui, -apple-system, Helvetica Neue, sans-serif"
    font-size="22"
    font-weight="400"
    fill="rgba(255,255,255,0.60)"
    letter-spacing="0.3"
    text-anchor="middle"
    dominant-baseline="auto"
  >Fast, secure cross-border transfers</text>
</svg>
